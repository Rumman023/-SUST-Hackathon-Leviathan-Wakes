# fly.toml — fly.io app configuration for QueueStorm Investigator
# Docs: https://fly.io/docs/reference/configuration/

app = "queuestorm-investigator"
primary_region = "sin"  # Singapore — closest to SUST / Bangladesh

# Bind to all interfaces, use the PORT env var injected by fly.io.
[env]
  PORT = "8000"
  LOG_LEVEL = "INFO"
  REQUEST_TIMEOUT_S = "25"
  REQUEST_MAX_BYTES = "32768"

  # Optional Qwen auditor. Set secrets via `fly secrets set`:
  #   fly secrets set HF_TOKEN=hf_xxx
  #   fly secrets set USE_LLM_PROVIDER=qwen
  #   fly secrets set LLM_AUDIT=1
  # Leave USE_LLM=0 by default; the rule engine + safety pass is fully
  # functional with no keys set.
  USE_LLM = "0"
  USE_LLM_PROVIDER = "openai"
  LLM_AUDIT = "1"
  HF_MODEL = "Qwen/Qwen2.5-7B-Instruct"
  LLM_TIMEOUT = "6"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # Generous timeouts: rule-engine p95 is ~30 ms but the optional Qwen audit
  # adds a single HTTPS round-trip with a 6 s cap. /health should be near-instant.
  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

